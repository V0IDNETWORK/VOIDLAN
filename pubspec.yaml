name: void_lan
description: "VOID LAN — offline-first LAN discovery, file transfer, and messenger."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management / navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking / LAN
  network_info_plus: ^6.0.1
  connectivity_plus: ^6.0.5
  device_info_plus: ^10.1.2

  # Files / desktop interaction
  file_picker: ^8.0.6
  desktop_drop: ^0.4.4
  path_provider: ^2.1.4
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Security / storage
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # System / permissions
  permission_handler: ^11.3.1
  local_notifier: ^0.1.6
  flutter_local_notifications: ^17.2.2
  window_manager: ^0.4.2

  # Utilities
  logger: ^2.4.0
  uuid: ^4.4.2
  path: ^1.9.0
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
